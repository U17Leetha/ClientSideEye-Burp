<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ClientSideEye Bridge</title>
        <style>
            :root {
                color-scheme: light;
            }
            body {
                font:
                    13px/1.4 -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                margin: 12px;
                width: 340px;
            }
            button {
                width: 100%;
                padding: 8px 10px;
                border: 0;
                background: #1f6feb;
                color: #fff;
                border-radius: 6px;
                cursor: pointer;
            }
            button:disabled {
                background: #6e7781;
                cursor: not-allowed;
            }
            label {
                display: block;
                margin-top: 10px;
                font-weight: 600;
            }
            input {
                width: 100%;
                box-sizing: border-box;
                margin-top: 4px;
                padding: 8px 10px;
                border: 1px solid #d0d7de;
                border-radius: 6px;
            }
            #status {
                margin-top: 10px;
                white-space: pre-wrap;
            }
            .muted {
                color: #57606a;
                font-size: 12px;
                margin-top: 8px;
            }
        </style>
    </head>
    <body>
        <label for="bridgeToken">Bridge token</label>
        <input
            id="bridgeToken"
            type="password"
            placeholder="Paste token from Burp ClientSideEye tab"
            autocomplete="off"
            spellcheck="false"
        />
        <button id="saveToken">Save Bridge Token</button>
        <button id="scanSend">Quick Scan + Send</button>
        <button id="watchSend">Deep Scan (15s Runtime) + Send</button>
        <div id="status">Idle</div>
        <div class="muted">
            Bridge endpoint: auto-detects
            http://127.0.0.1:17373-17382/api/finding. The Burp extension now
            requires a per-session bridge token and the deep scan mode installs temporary runtime hooks.
        </div>
        <script src="popup-bridge.js"></script>
        <script src="popup-runtime.js"></script>
        <script src="popup-findings.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
