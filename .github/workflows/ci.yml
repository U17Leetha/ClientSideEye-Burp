name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks and build jar
        run: ./gradlew clean check jar

      - name: Upload root jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientSideEye-Burp-root-jar
          path: ClientSideEye-Burp.jar

      - name: Upload versioned jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientSideEye-Burp-versioned-jar
          path: build/libs/ClientSideEye-Burp-*.jar
